<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 Panel Admin - Quiniela Mundial 2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a1f2e 0%, #1a3a4a 50%, #0d2b3a 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .btn-warning {
        background: linear-gradient(45deg, #ff9800, #f57c00);
        color: white;
}
        .btn-warning:hover {
         transform: translateY(-2px);
         box-shadow: 0 5px 15px rgba(255, 152, 0, 0.3);
}
        h1 { color: #FFD700; }
        .admin-badge { background: #ff4444; padding: 5px 15px; border-radius: 20px; font-weight: bold; }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-primary { background: linear-gradient(45deg, #FFD700, #FFA500); color: #0a1f2e; }
        .btn-danger { background: linear-gradient(45deg, #ff4444, #cc0000); color: white; }
        .btn-secondary { background: rgba(255, 255, 255, 0.2); color: white; }
        .btn-success { background: linear-gradient(45deg, #00cc88, #009966); color: white; }
        .btn:hover { transform: translateY(-2px); }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        .stat-number { font-size: 2.5em; color: #FFD700; font-weight: bold; }
        .users-table {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            overflow-x: auto;
            margin-bottom: 30px;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        th { color: #FFD700; }
        .delete-btn { background: #ff4444; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .results-section {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
        }
        .logout-btn { background: rgba(255, 255, 255, 0.2); color: white; margin-left: 10px; }
        .message { margin-top: 15px; padding: 10px; border-radius: 10px; display: none; }
        .message-success { background: rgba(0, 255, 0, 0.2); border: 1px solid #00ff88; color: #88ff88; }
        .message-error { background: rgba(255, 0, 0, 0.2); border: 1px solid #ff4444; color: #ff8888; }
        .watermark {
            position: fixed; bottom: 15px; right: 20px; font-size: 12px;
            color: rgba(255, 255, 255, 0.25); background: rgba(0, 0, 0, 0.3);
            padding: 5px 12px; border-radius: 20px; backdrop-filter: blur(5px);
            pointer-events: none; z-index: 999;
        }
    </style>
</head>
<body>
    <div class="watermark">🏆 Lizjmnz08</div>
    <div class="container">
        <div class="header">
            <div><h1>👑 Panel de Administración</h1><p>Quiniela Mundial 2026</p></div>
            <div><span class="admin-badge" id="adminName">Administrador</span>
            <button class="btn logout-btn" onclick="logout()">🚪 Cerrar Sesión</button></div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-number" id="totalUsers">0</div><div>👥 Usuarios Registrados</div></div>
            <div class="stat-card"><div class="stat-number" id="totalApuestas">0</div><div>📊 Apuestas Realizadas</div></div>
            <div class="stat-card"><div class="stat-number" id="totalResultados">0</div><div>✅ Partidos con Resultado</div></div>
        </div>

        <div class="users-table">
            <h2>📋 Usuarios Registrados</h2>
            <div style="overflow-x: auto;">
                <table>
                    <thead><tr><th>ID</th><th>Usuario</th><th>Nombre</th><th>Email</th><th>Rol</th><th>Fecha</th><th>Acciones</th></tr></thead>
                    <tbody id="usersList"></tbody>
                </table>
            </div>
        </div>

        <div class="results-section">
            <h2>⚽ Gestión de Resultados</h2>
            <p>Simula resultados de partidos para calcular puntuaciones</p>
            <button class="btn btn-success" onclick="simularResultados()">⚡ Simular Resultados</button>
            <button class="btn btn-secondary" onclick="limpiarResultados()">🗑️ Limpiar Resultados</button>
            <div id="message" class="message"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://quiniela-mundial-2026-production-bde0.up.railway.app/api';
        let token = localStorage.getItem('token');

        async function checkAuth() {
            if (!token) { window.location.href = 'login.html'; return false; }
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (user.role !== 'admin') { window.location.href = 'index.html'; return false; }
            document.getElementById('adminName').innerHTML = `👑 ${user.username}`;
            return true;
        }

        async function fetchAPI(endpoint, options = {}) {
            const response = await fetch(`${API_URL}${endpoint}`, {
                ...options,
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`, ...options.headers }
            });
            if (response.status === 401) { localStorage.clear(); window.location.href = 'login.html'; throw new Error('No autorizado'); }
            return response.json();
        }

        async function loadStats() {
            const usuarios = await fetchAPI('/usuarios');
            const resultados = await fetchAPI('/resultados');
            document.getElementById('totalUsers').textContent = usuarios.length;
            document.getElementById('totalResultados').textContent = resultados.length;
        }

        async function loadUsers() {
    const usuarios = await fetchAPI('/usuarios');
    const tbody = document.getElementById('usersList');
    tbody.innerHTML = '';
    
    for (const user of usuarios) {
        const row = tbody.insertRow();
        row.insertCell(0).textContent = user.id;
        row.insertCell(1).textContent = user.username;
        row.insertCell(2).textContent = user.fullname || '-';
        row.insertCell(3).textContent = user.email || '-';
        row.insertCell(4).textContent = user.role === 'admin' ? '👑 Admin' : '👤 Usuario';
        row.insertCell(5).textContent = user.fecha_registro ? new Date(user.fecha_registro).toLocaleDateString() : '-';
        
        const actionsCell = row.insertCell(6);
        
        if (user.role !== 'admin') {
            // Botón para limpiar apuestas
            const clearBtn = document.createElement('button');
            clearBtn.textContent = '🧹 Limpiar Apuestas';
            clearBtn.style.background = '#ff9800';
            clearBtn.style.color = 'white';
            clearBtn.style.border = 'none';
            clearBtn.style.padding = '5px 10px';
            clearBtn.style.borderRadius = '5px';
            clearBtn.style.marginRight = '5px';
            clearBtn.style.cursor = 'pointer';
            clearBtn.onclick = () => limpiarApuestasUsuario(user.id, user.username);
            actionsCell.appendChild(clearBtn);
            
            // Botón para eliminar usuario
            const deleteBtn = document.createElement('button');
            deleteBtn.textContent = '🗑️ Eliminar';
            deleteBtn.className = 'delete-btn';
            deleteBtn.onclick = () => eliminarUsuario(user.id);
            actionsCell.appendChild(deleteBtn);
        } else {
            actionsCell.textContent = '📌';
        }
    }
}
        // Función para limpiar apuestas de un usuario específico
async function limpiarApuestasUsuario(usuarioId, username) {
    if (confirm(`⚠️ ¿Eliminar TODAS las apuestas de ${username}? Esta acción no se puede deshacer.`)) {
        try {
            const response = await fetch(`${API_URL}/apuestas/usuario/${usuarioId}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();
            
            if (data.success) {
                showMessage(`✅ Apuestas de ${username} eliminadas correctamente`, 'success');
                // Opcional: recargar estadísticas
                await loadStats();
            } else {
                showMessage(`❌ Error: ${data.error}`, 'error');
            }
        } catch (error) {
            console.error('Error:', error);
            showMessage('❌ Error al limpiar las apuestas', 'error');
        }
    }
}

        async function eliminarUsuario(id) {
            if (confirm('¿Eliminar este usuario?')) {
                await fetchAPI(`/usuarios/${id}`, { method: 'DELETE' });
                await loadUsers();
                await loadStats();
                showMessage('✅ Usuario eliminado', 'success');
            }
        }

        async function simularResultados() {
            if (confirm('⚠️ ¿Simular resultados aleatorios para todos los partidos?')) {
                await fetchAPI('/simular', { method: 'POST' });
                showMessage('✅ Resultados simulados correctamente', 'success');
                await loadStats();
            }
        }

        async function limpiarResultados() {
            showMessage('Funcionalidad en desarrollo', 'error');
        }

        function showMessage(msg, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = msg;
            msgDiv.className = `message message-${type}`;
            msgDiv.style.display = 'block';
            setTimeout(() => msgDiv.style.display = 'none', 3000);
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        document.addEventListener('DOMContentLoaded', async () => {
            if (await checkAuth()) {
                await loadStats();
                await loadUsers();
            }
        });
    </script>
</body>
</html>

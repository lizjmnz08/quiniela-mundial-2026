<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 Registro - Quiniela Mundial 2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a1f2e 0%, #1a3a4a 50%, #0d2b3a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .register-container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            border: 2px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        .logo { text-align: center; font-size: 3em; margin-bottom: 15px; }
        h1 { text-align: center; color: #FFD700; margin-bottom: 25px; font-size: 1.6em; }
        .input-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; color: #c4e0f0; font-weight: bold; }
        input {
            width: 100%; padding: 12px; background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 215, 0, 0.3); border-radius: 10px;
            color: white; font-size: 1em;
        }
        input:focus { outline: none; border-color: #FFD700; background: rgba(255, 255, 255, 0.15); }
        .btn {
            width: 100%; padding: 12px; background: linear-gradient(45deg, #FFD700, #FFA500);
            border: none; border-radius: 10px; font-weight: bold; font-size: 1.1em;
            cursor: pointer; margin-top: 10px;
        }
        .btn:hover { transform: translateY(-2px); }
        .login-link { text-align: center; margin-top: 20px; color: #a0c4d8; }
        .login-link a { color: #FFD700; text-decoration: none; }
        .error-message, .success-message {
            border-radius: 10px; padding: 10px; margin-top: 15px;
            text-align: center; display: none;
        }
        .error-message { background: rgba(255, 0, 0, 0.2); border: 1px solid #ff4444; color: #ff8888; }
        .success-message { background: rgba(0, 255, 0, 0.2); border: 1px solid #00ff88; color: #88ff88; }
        .watermark {
            position: fixed; bottom: 15px; right: 20px; font-size: 12px;
            color: rgba(255, 255, 255, 0.25); background: rgba(0, 0, 0, 0.3);
            padding: 5px 12px; border-radius: 20px; backdrop-filter: blur(5px);
            pointer-events: none; z-index: 999;
        }
    </style>
</head>
<body>
    <div class="watermark">🏆 Lizjmnz08</div>
    <div class="register-container">
        <div class="logo">⚽📝⚽</div>
        <h1>Crear Nueva Cuenta</h1>
        <form id="registerForm">
            <div class="input-group">
                <label>👤 Nombre Completo</label>
                <input type="text" id="fullname" placeholder="Ej: Juan Pérez" required>
            </div>
            <div class="input-group">
                <label>📧 Correo Electrónico</label>
                <input type="email" id="email" placeholder="ejemplo@correo.com" required>
            </div>
            <div class="input-group">
                <label>👨‍💼 Usuario</label>
                <input type="text" id="username" placeholder="Ej: juan123" required>
            </div>
            <div class="input-group">
                <label>🔒 Contraseña</label>
                <input type="password" id="password" placeholder="Mínimo 6 caracteres" required>
            </div>
            <div class="input-group">
                <label>🔒 Confirmar Contraseña</label>
                <input type="password" id="confirmPassword" placeholder="Repite tu contraseña" required>
            </div>
            <button type="submit" class="btn">✅ Registrarse</button>
        </form>
        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>
        <div class="login-link">
            ¿Ya tienes cuenta? <a href="login.html">Inicia Sesión aquí</a>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const fullname = document.getElementById('fullname').value;
            const email = document.getElementById('email').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            const errorMsg = document.getElementById('errorMessage');
            const successMsg = document.getElementById('successMessage');
            
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            
            if (password !== confirmPassword) {
                errorMsg.textContent = '❌ Las contraseñas no coinciden';
                errorMsg.style.display = 'block';
                return;
            }
            
            if (password.length < 6) {
                errorMsg.textContent = '❌ La contraseña debe tener al menos 6 caracteres';
                errorMsg.style.display = 'block';
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, fullname, email })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    successMsg.textContent = '✅ Cuenta creada exitosamente! Redirigiendo...';
                    successMsg.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    errorMsg.textContent = data.error || '❌ Error al registrar';
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                errorMsg.textContent = '❌ Error al conectar con el servidor';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
